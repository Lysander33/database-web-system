{% if pagination.pages > 1 %}
<div class="pagination">
    {% if pagination.has_prev %}
    <a class="btn btn-sm btn-ghost" href="{{ url_for(request.endpoint, page=pagination.prev_num, **request.view_args) }}">&larr; 上一页</a>
    {% endif %}
    <span class="page-num">{{ pagination.page }} / {{ pagination.pages }}</span>
    {% if pagination.has_next %}
    <a class="btn btn-sm btn-ghost" href="{{ url_for(request.endpoint, page=pagination.next_num, **request.view_args) }}">下一页 &rarr;</a>
    {% endif %}
</div>
{% endif %}
