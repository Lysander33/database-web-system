{% extends "base.html" %}
{% block title %}服务器错误 - 秒杀系统{% endblock %}
{% block content %}
<div class="error-page">
    <svg class="error-illustration" viewBox="0 0 200 120" fill="none">
        <circle cx="60" cy="45" r="28" stroke="#D9756E" stroke-width="0.8" opacity="0.3"/>
        <circle cx="140" cy="38" r="18" stroke="#D9756E" stroke-width="0.7" opacity="0.2"/>
        <circle cx="100" cy="80" r="12" stroke="#D9756E" stroke-width="0.6" opacity="0.15"/>
        <line x1="82" y1="52" x2="118" y2="52" stroke="#D9756E" stroke-width="0.6" opacity="0.25"/>
        <line x1="88" y1="58" x2="112" y2="58" stroke="#D9756E" stroke-width="0.5" opacity="0.18"/>
    </svg>
    <div class="error-code">500</div>
    <p>服务器内部错误，请稍后再试</p>
    <a class="btn btn-primary" href="{{ url_for('seckill.index') }}">返回首页</a>
</div>
{% endblock %}
