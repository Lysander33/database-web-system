{% extends "base.html" %}
{% block title %}后台管理 - 秒杀系统{% endblock %}
{% block content %}
<h2>管理后台</h2>
<div class="admin-cards">
    <div class="admin-card">
        <h3>{{ product_count }}</h3>
        <p>商品总数</p>
        <a href="{{ url_for('admin.manage_products') }}">管理商品</a>
    </div>
    <div class="admin-card">
        <h3>{{ order_count }}</h3>
        <p>订单总数</p>
        <a href="{{ url_for('admin.list_orders') }}">查看订单</a>
    </div>
</div>
{% endblock %}
