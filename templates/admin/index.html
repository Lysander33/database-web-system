{% extends "base.html" %}
{% block title %}后台管理 - 秒杀系统{% endblock %}
{% block content %}
<div class="page-header">
    <h1>管理后台</h1>
    <p>系统运行概览</p>
</div>
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-number">{{ product_count }}</div>
        <div class="stat-label">商品总数</div>
        <a href="{{ url_for('admin.manage_products') }}">管理商品 &rarr;</a>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ order_count }}</div>
        <div class="stat-label">订单总数</div>
        <a href="{{ url_for('admin.list_orders') }}">查看订单 &rarr;</a>
    </div>
</div>
{% endblock %}
