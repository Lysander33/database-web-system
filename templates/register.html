{% extends "base.html" %}
{% block title %}注册 - 秒杀系统{% endblock %}
{% block content %}
<div class="form-wrapper">
    <h2>用户注册</h2>
    <form method="POST">
        <label>用户名</label>
        <input type="text" name="username" required autofocus>
        <label>密码</label>
        <input type="password" name="password" required>
        <button type="submit">注册</button>
    </form>
    <p class="form-footer">已有账号？<a href="{{ url_for('auth.login_page') }}">立即登录</a></p>
</div>
{% endblock %}
